<body>

<div class="meta"><b>illuminairy / landing</b> · iPhone 15 Pro · 393×852</div>

<div id="root" class="stage"></div>

<script>
  /* Relay the tweaks-panel protocol between the host (parent) and the
     Landing iframe inside this wrapper. The actual <TweaksPanel> lives
     inside the iframe — this just bridges the postMessage hops so the
     toolbar Tweaks toggle works. */
  (function () {
    const findFrame = () => document.querySelector("#root iframe");

    // Iframe → parent (forward up)
    window.addEventListener("message", (e) => {
      const frame = findFrame();
      if (!e.data || typeof e.data !== "object") return;
      // From iframe: relay availability / dismissal / persistence to host
      if (frame && e.source === frame.contentWindow) {
        const t = e.data.type;
        if (t === "__edit_mode_available" ||
            t === "__edit_mode_dismissed"  ||
            t === "__edit_mode_set_keys") {
          window.parent.postMessage(e.data, "*");
        }
        return;
      }
      // From host: relay activate/deactivate down into the iframe
      if (e.source === window.parent) {
        const t = e.data.type;
        if (t === "__activate_edit_mode" || t === "__deactivate_edit_mode") {
          if (frame && frame.contentWindow) {
            frame.contentWindow.postMessage(e.data, "*");
          }
        }
      }
    });
  })();
</script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">
  function PhonePreview() {
    return (
      <IOSDevice width={393} height={852}>

          src="Landing.html"
          title="Landing"
          style={{

            display: "block",
            background: "#fff"
          }}
        ></iframe>
      </IOSDevice>
    );
  }
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<PhonePreview />);
</script>
